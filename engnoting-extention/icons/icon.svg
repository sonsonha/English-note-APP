<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">

  <!-- Background -->
  <rect width="128" height="128" rx="26" fill="#4f46e5"/>

  <!-- Subtle top-left highlight panel -->
  <rect width="128" height="64" rx="26" fill="white" opacity="0.06"/>

  <!-- Left page (bright white, front) -->
  <path d="M15 84 L62 73 L62 34 C44 35 17 45 15 63 Z" fill="white"/>

  <!-- Right page (muted periwinkle, behind) -->
  <path d="M113 84 L66 73 L66 34 C84 35 111 45 113 63 Z" fill="#a5b4fc"/>

  <!-- Centre spine shadow line -->
  <line x1="64" y1="34" x2="64" y2="73" stroke="#4f46e5" stroke-width="1.5" opacity="0.4"/>

  <!-- Text lines on white left page -->
  <rect x="22" y="51" width="31" height="4" rx="2" fill="#6366f1" opacity="0.45"/>
  <rect x="22" y="60" width="25" height="4" rx="2" fill="#6366f1" opacity="0.45"/>
  <rect x="22" y="69" width="28" height="4" rx="2" fill="#6366f1" opacity="0.45"/>

  <!-- Golden five-point star (top-right accent) -->
  <polygon
    points="96,14 98.5,21.5 106.5,21.5 100.3,26 102.5,33.5 96,29.2 89.5,33.5 91.7,26 85.5,21.5 93.5,21.5"
    fill="#fbbf24"/>

